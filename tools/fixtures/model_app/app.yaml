# End-to-end fixture: a complete app whose only work is a Simulink SWC wired via
# the RTE. Running `erosgen` here emits config.*, Makefile, main.c, os_gen.h AND
# Rte.h/Rte_Cfg.h/Rte.c, with appKnbSwt wired as TASK_APPKNBSWT/ALARM_APPKNBSWT.
# The committed generated files are golden snapshots; regenerate, never edit:
#   uv run python tools/erosgen.py tools/fixtures/model_app/app.yaml
system:
  name: knbdemo
  kernel_dir: ../../../kernel
  drivers_dir: ../../../drivers
  hooks: { startup: true, error: true, shutdown: true }

tasks:
  - { name: init, autostart: true, wcet_ms: 2 }   # arms the alarm

resources:
  - { name: rte, users: [appKnbSwt] }             # the model's shared section

models:
  - name: appKnbSwt
    codegen_dir: ../../../codegen/appKnbSwt_ert_rtw
    runnable: appKnbSwt_Runnable
    rate_ms: 10
    wcet_ms: 2
    ports:
      in:  [{ signal: IN_KnbVal_Z, driver: adc, channel: 0 }]     # A0
      out: [{ signal: OUT_Led1_B, driver: dio, port: B, bit: 5 }] # PB5 / D13
