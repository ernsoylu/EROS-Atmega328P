# =====================================================================
# EROS comprehensive demo - system configuration (the "OIL file").
# Regenerate config.h/config.c/Makefile with:
#   python3 ../tools/erosgen.py app.yaml
# main.c and the asw_*.c rate files are owned by you once generated.
# =====================================================================

system:
  name: demo
  kernel_dir: ../kernel
  drivers_dir: ../drivers      # where shared peripheral drivers resolve
  tick_hz: 1000
  hooks: { startup: true, error: true, shutdown: true }
  # no budget block: this demo tracks the whole-image avr-size only

# Application-owned sources: integration layer, cross-rate signals and
# one file per task rate.
sources:
  - main.c
  - asw_signals.c
  - asw_10ms.c
  - asw_50ms.c
  - asw_100ms.c
  - asw_500ms.c

# Peripherals actually used. uart.c/pwm.c live in THIS directory so they
# resolve locally; the rings are the dominant RAM cost - sized to the
# 9600-baud wire math (48 B/50 ms), not generously.
peripherals:
  uart:
    baud: 9600
    tx_ring: 128
    rx_ring: 64
  pwm: {}                       # Timer1 breathing LED (OC1A/PB1)

tasks:
  - name: startup
    autostart: true
    wcet_ms: 2
  - name: status
    period_ms: 500
    wcet_ms: 2
    runnables: [Asw_Status]
  - name: ramp
    period_ms: 100
    wcet_ms: 1
    runnables: [Asw_Ramp]
  - name: cmd
    period_ms: 50
    wcet_ms: 2
    runnables: [Asw_Cmd]
  - name: button
    period_ms: 10
    wcet_ms: 1
    runnables: [Asw_Button]

resources:
  - name: uart                  # groups the multi-part status line
    users: [status, cmd]
    mask_tick_isr: false         # UART ISRs never print; no ISR ceiling

pool:
  block_size: 8
  blocks: 4
